services:
  garnet:
    image: "ghcr.io/microsoft/garnet"
    restart: always
    ulimits:
      memlock: -1
    ports:
      - "6379:6379"
    network_mode: "host"
    command: [
        # Total log memory used in bytes
        "--memory",
        "8000000000",
        "--auth",
        "Password",
        "--password",
        "${GARNET_PASSWORD}",
        "--aof",
        "True",
      ]
    volumes:
      - /Docker/panso.se/garnet/data:/data
      - /Docker/panso.se/garnet/logdir:/logdir
